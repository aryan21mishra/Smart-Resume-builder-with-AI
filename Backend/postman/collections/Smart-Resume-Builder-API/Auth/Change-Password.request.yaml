$kind: http-request
name: Change Password
method: PUT
url: '{{baseUrl}}/users/change-password'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "password123",
      "newPassword": "newpassword456"
    }
